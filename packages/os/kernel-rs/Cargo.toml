[package]
name = "webos-kernel"
version = "0.1.0"
edition = "2021"
description = "WebOS Microkernel - Rust + WebAssembly"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
wee_alloc = "0.4"

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
strip = true

[profile.dev]
panic = "abort"
